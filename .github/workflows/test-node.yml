name: Test node scripts

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  generate_sources_tests:
    name: Test node scripts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run node tests
        run: npm run test:node
